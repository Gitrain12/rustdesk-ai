# Security Configuration for RustDesk AI
# This file contains security-related settings

# Encryption Settings
ENCRYPTION_ENABLED=true
ENCRYPTION_ALGORITHM=ChaCha20-Poly1305
KEY_DERIVATION_FUNCTION=Argon2

# Authentication Settings
JWT_SECRET=your-production-jwt-secret-min-32-chars
JWT_EXPIRATION=86400
REFRESH_TOKEN_EXPIRATION=604800

# API Security
API_RATE_LIMIT=100
API_RATE_LIMIT_WINDOW=900000
MAX_REQUEST_SIZE=10485760

# SSL/TLS Settings
SSL_ENABLED=true
SSL_PROTOCOL=TLSv1.3
SSL_CIPHERS=ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# Database Security (if applicable)
DB_ENCRYPTION_ENABLED=true
DB_BACKUP_ENCRYPTED=true

# Security Headers
X_FRAME_OPTIONS=SAMEORIGIN
X_CONTENT_TYPE_OPTIONS=nosniff
X_XSS_PROTECTION=1; mode=block
REFERRER_POLICY=strict-origin-when-cross-origin
CONTENT_SECURITY_POLICY=default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'

# Audit & Logging
AUDIT_LOG_ENABLED=true
AUDIT_LOG_RETENTION_DAYS=90
FAILED_LOGIN_LIMIT=5
FAILED_LOGIN_LOCKOUT_DURATION=900

# Session Management
SESSION_TIMEOUT=3600
MAX_CONCURRENT_SESSIONS=3
SESSION_IP_BINDING=true

# AI Service Security
AI_API_KEY_REQUIRED=true
AI_IMAGE_MAX_SIZE=5242880
AI_REQUEST_TIMEOUT=30000
AI_RATE_LIMIT=50
AI_RATE_LIMIT_WINDOW=3600000