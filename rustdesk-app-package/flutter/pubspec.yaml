name: rustdesk_ai
description: RustDesk Mobile App with AI Integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.0
  get: ^4.6.0

  shared_preferences: ^2.2.0
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  permission_handler: ^11.0.0
