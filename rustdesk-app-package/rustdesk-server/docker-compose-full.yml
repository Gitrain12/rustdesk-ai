# RustDesk Server with AI Backend - Docker-Compose Configuration
# Complete deployment including RustDesk server and AI services
# 使用方法: docker compose -f docker-compose-full.yml up -d

version: '3.8'

services:
  hbbs:
    container_name: rustdesk-hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r hbbr:21117
    volumes:
      - rustdesk-data:/root
    network_mode: "host"
    depends_on:
      - hbbr
    restart: unless-stopped
    environment:
      - ALWAYS_USE_RELAY=N
      - ENCRYPTED_ONLY=1
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "21116"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rustdesk-network
    labels:
      - "com.rustdesk.type=id-server"

  hbbr:
    container_name: rustdesk-hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    volumes:
      - rustdesk-data:/root
    network_mode: "host"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "21117"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rustdesk-network
    labels:
      - "com.rustdesk.type=relay-server"

  ai-backend:
    container_name: rustdesk-ai-backend
    build:
      context: ../ai-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=info
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    volumes:
      - ../ai-backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rustdesk-network
      - ai-network
    labels:
      - "com.rustdesk.type=ai-service"
    depends_on:
      - redis

  redis:
    container_name: rustdesk-ai-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ai-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    labels:
      - "com.rustdesk.type=cache"

  nginx:
    container_name: rustdesk-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - rustdesk-network
      - ai-network
    labels:
      - "com.rustdesk.type=proxy"
    depends_on:
      - hbbs
      - hbbr
      - ai-backend

networks:
  rustdesk-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  rustdesk-data:
    driver: local
  redis-data:
    driver: local