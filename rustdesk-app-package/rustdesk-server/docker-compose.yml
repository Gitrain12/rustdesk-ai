# RustDesk Docker-Compose 配置
# 使用方法: docker compose up -d

version: '3.8'

services:
  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r hbbr:21117
    volumes:
      - ./data:/root
    network_mode: "host"
    depends_on:
      - hbbr
    restart: unless-stopped
    environment:
      # N=优先P2P直连, Y=强制使用中继
      - ALWAYS_USE_RELAY=N
      # 启用后仅允许加密连接
      - ENCRYPTED_ONLY=1
    # 健康检查
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "21116"]
      interval: 30s
      timeout: 10s
      retries: 3

  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    volumes:
      - ./data:/root
    network_mode: "host"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "21117"]
      interval: 30s
      timeout: 10s
      retries: 3

# 持久化数据存储
volumes:
  rustdesk_data:
    driver: local
